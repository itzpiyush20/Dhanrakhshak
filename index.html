    <title>Dhanrakshak — Personal Finance Dashboard</title>
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('dhanrakshak_theme');
          var themeColor = '#09090b';
          if (stored !== 'dark') {
            document.documentElement.classList.add('light');
            themeColor = '#ffffff';
          } else {
            document.documentElement.classList.remove('light');
          }
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) {
            meta.setAttribute('content', themeColor);
          }
        } catch (e) {}
      })();
    </script>

    <!-- Global resource error handler to prevent White Screen of Death on redeploy/404 assets -->
    <script>
      window.addEventListener('error', function(e) {
        try {
          var target = e.target;
          if (target && (target.tagName === 'SCRIPT' || target.tagName === 'LINK')) {
            var src = target.src || target.href;
            if (src && (src.indexOf('/assets/') !== -1 || src.indexOf('index-') !== -1)) {
              console.warn('HTML Head: Asset load failed. Checking for reload loop...', src);
              var now = Date.now();
              var lastReload = sessionStorage.getItem('dhanrakshak_last_auto_reload');
              if (lastReload && (now - Number(lastReload) < 15000)) {
                console.error('HTML Head: Reload loop suppressed.');
                return;
              }
              sessionStorage.setItem('dhanrakshak_last_auto_reload', String(now));
              window.location.reload();
            }
          }
        } catch (err) {}
      }, true); // Use capture phase
    </script>

    <!-- Bulletproof legacy service worker and cache purge (Background only) -->
    <script>
      try {
        if (typeof window !== 'undefined') {
          var PURGE_KEY = 'dhanrakshak_purge_v4';
          if (!localStorage.getItem(PURGE_KEY)) {
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for (var i = 0; i < registrations.length; i++) {
                  registrations[i].unregister();
                }
              });
            }
            if ('caches' in window) {
              caches.keys().then(function(keys) {
                return Promise.all(keys.map(function(key) {
                  return caches.delete(key);
                }));
              });
            }
            try {
              localStorage.setItem(PURGE_KEY, 'true');
            } catch (se) {}
            console.log('webapp: Caches and Service Workers successfully purged in background.');
          }
        }
      } catch (e) {
        console.error('webapp: Cache purge failed', e);
      }
    </script>
