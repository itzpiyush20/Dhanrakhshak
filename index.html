    <!-- Bulletproof legacy service worker and cache purge -->
    <script>
      try {
        if (typeof window !== 'undefined') {
          const urlParams = new URLSearchParams(window.location.search);
          if (urlParams.get('purged') === 'true') {
            console.log('webapp: Cache already purged.');
          } else {
            const PURGE_KEY = 'dhanrakshak_purge_v3';
            if (!localStorage.getItem(PURGE_KEY)) {
              if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                  for (let registration of registrations) {
                    registration.unregister();
                  }
                });
              }
              if ('caches' in window) {
                caches.keys().then(function(keys) {
                  return Promise.all(keys.map(function(key) {
                    return caches.delete(key);
                  }));
                });
              }
              try {
                localStorage.setItem(PURGE_KEY, 'true');
              } catch (se) {}
              console.log('webapp: Caches and Service Workers successfully purged. Reloading page...');
              setTimeout(function() {
                const search = new URLSearchParams(window.location.search);
                search.set('purged', 'true');
                window.location.replace(window.location.pathname + '?' + search.toString() + (window.location.hash || ''));
              }, 600);
            }
          }
        }
      } catch (e) {
        console.error('webapp: Cache purge failed', e);
      }
    </script>
